<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Frequency Quant Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>
    
    <div class="glass-container">
        <header>
            <h1>HFT <span>Monte Carlo Simulator</span></h1>
            <p>Demonstrating the exponential compounding power of a marginal statistical edge.</p>
        </header>

        <main class="grid-layout">
            <!-- Controls Sidebar -->
            <aside class="controls-panel">
                <div class="control-group">
                    <label for="winRate">Win Rate (<span id="winRateVal">51.5</span>%)</label>
                    <input type="range" id="winRate" min="45.0" max="60.0" step="0.1" value="51.5">
                </div>
                
                <div class="control-group">
                    <label for="numTrades">Number of Trades (<span id="numTradesVal">5000</span>)</label>
                    <input type="range" id="numTrades" min="100" max="10000" step="100" value="5000">
                </div>

                <div class="control-group">
                    <label for="riskPerTrade">Risk per Trade (<span id="riskPerTradeVal">1.0</span>%)</label>
                    <input type="range" id="riskPerTrade" min="0.1" max="10.0" step="0.1" value="1.0">
                </div>

                <button id="runBtn" class="glow-button">
                    <span class="btn-content">Run Monte Carlo Simulation</span>
                </button>
            </aside>

            <!-- Chart Area -->
            <section class="chart-panel">
                <div class="chart-wrapper">
                    <canvas id="equityChart"></canvas>
                </div>
            </section>
        </main>

        <!-- Dashboard Metrics -->
        <section class="dashboard">
            <div class="metric-card">
                <h3>Starting Equity</h3>
                <p id="statStart">$100,000.00</p>
            </div>
            <div class="metric-card">
                <h3>Final Equity</h3>
                <p id="statFinal" class="highlight">$0.00</p>
            </div>
            <div class="metric-card">
                <h3>Total Winners</h3>
                <p id="statWins" class="success">0</p>
            </div>
            <div class="metric-card">
                <h3>Total Losers</h3>
                <p id="statLosses" class="danger">0</p>
            </div>
            <div class="metric-card">
                <h3>Max Drawdown</h3>
                <p id="statDrawdown" class="danger">0.00%</p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
