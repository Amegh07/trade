<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM DIAGNOSTIC TOOL</title>
    <!-- React & ReactDOM (Development for Babel) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Matter.js for Physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #00ff00;
            --border-color: #008800;
            --accent-color: #00ff00;
            --disabled-color: #004400;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            border: 2px solid var(--border-color);
            padding: 30px;
            box-sizing: border-box;
            background: linear-gradient(180deg, #021102 0%, #000000 100%);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-top: 0;
            margin-bottom: 30px;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
            letter-spacing: 2px;
        }
        .panel {
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 25px;
            background-color: rgba(0, 20, 0, 0.4);
        }
        .panel h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #00cc00;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
        }
        button {
            background-color: var(--bg-color);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 12px 24px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }
        button:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
        }
        button:disabled {
            color: var(--disabled-color);
            border-color: var(--disabled-color);
            cursor: not-allowed;
            box-shadow: none;
        }
        .control-group {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        input[type="range"] {
            accent-color: var(--accent-color);
            width: 200px;
        }
        .progress-container {
            width: 100%;
            height: 25px;
            border: 1px solid var(--border-color);
            margin-top: 15px;
            position: relative;
            background-color: #001100;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--accent-color);
        }
        .readout-status {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--accent-color);
        }
        .canvas-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        canvas {
            border: 2px solid var(--border-color);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Engine, Render, Runner, World, Bodies, Composite } = Matter;

        function DiagnosticTool() {
            const [isRunning, setIsRunning] = useState(false);
            const [progress, setProgress] = useState(0);
            const [status, setStatus] = useState("AWAITING COMMAND");
            const [gravity, setGravity] = useState(1);
            
            const engineRef = useRef(null);
            const renderRef = useRef(null);
            const runnerRef = useRef(null);
            const sceneRef = useRef(null);
            const spawnerRef = useRef(null);

            // Initialize Matter.js
            useEffect(() => {
                // Setup Engine
                const engine = Engine.create();
                engine.world.gravity.y = gravity;
                engineRef.current = engine;

                // Setup Renderer inside the ref container
                const render = Render.create({
                    element: sceneRef.current,
                    engine: engine,
                    options: {
                        width: 400,
                        height: 300,
                        wireframes: false,
                        background: '#041004'
                    }
                });
                renderRef.current = render;

                // Create static boundaries
                const floor = Bodies.rectangle(200, 310, 420, 20, { 
                    isStatic: true, 
                    render: { fillStyle: '#005500', strokeStyle: '#00ff00', lineWidth: 1 } 
                });
                const leftWall = Bodies.rectangle(-10, 150, 20, 320, { 
                    isStatic: true, 
                    render: { fillStyle: '#005500', strokeStyle: '#00ff00', lineWidth: 1  } 
                });
                const rightWall = Bodies.rectangle(410, 150, 20, 320, { 
                    isStatic: true, 
                    render: { fillStyle: '#005500', strokeStyle: '#00ff00', lineWidth: 1  } 
                });
                
                World.add(engine.world, [floor, leftWall, rightWall]);

                // Run Engine & Renderer
                Render.run(render);
                const runner = Runner.create();
                Runner.run(runner, engine);
                runnerRef.current = runner;

                return () => {
                    Render.stop(render);
                    Runner.stop(runner);
                    if (engine.world) {
                        World.clear(engine.world);
                        Engine.clear(engine);
                    }
                    if (render.canvas) {
                        render.canvas.remove();
                    }
                };
            }, []);

            // Link Slider state -> Physics gravity update
            useEffect(() => {
                if (engineRef.current) {
                    engineRef.current.world.gravity.y = gravity;
                }
            }, [gravity]);

            // Handle Timing and Execution of logic
            useEffect(() => {
                let animationFrame;
                let startTime;
                const DURATION_MS = 3000;

                if (isRunning) {
                    setStatus("TESTING DATA PIPELINES...");
                    
                    // Box Spawner
                    spawnerRef.current = setInterval(() => {
                        if (engineRef.current) {
                            const size = 15 + Math.random() * 25;
                            const x = 50 + Math.random() * 300;
                            // Add a random slight rotation
                            const box = Bodies.rectangle(x, -20, size, size, {
                                angle: Math.random() * Math.PI,
                                render: { 
                                    fillStyle: '#00ff00', 
                                    strokeStyle: '#004400', 
                                    lineWidth: 2 
                                }
                            });
                            World.add(engineRef.current.world, box);
                            
                            // Cleanup entities offscreen to avoid memory leak
                            const bodies = Composite.allBodies(engineRef.current.world);
                            for (let i = 0; i < bodies.length; i++) {
                                if (bodies[i].position.y > 400 && !bodies[i].isStatic) {
                                    World.remove(engineRef.current.world, bodies[i]);
                                }
                            }
                        }
                    }, 500);

                    // Smooth progress bar animation
                    const animate = (timestamp) => {
                        if (!startTime) startTime = timestamp;
                        const elapsed = timestamp - startTime;
                        
                        if (elapsed < DURATION_MS) {
                            setProgress((elapsed / DURATION_MS) * 100);
                            animationFrame = requestAnimationFrame(animate);
                        } else {
                            setProgress(100);
                            setIsRunning(false);
                            setStatus("SYSTEM NOMINAL - ALL SYSTEMS GO");
                            if (spawnerRef.current) {
                                clearInterval(spawnerRef.current);
                            }
                        }
                    };
                    animationFrame = requestAnimationFrame(animate);
                }

                return () => {
                    if (animationFrame) cancelAnimationFrame(animationFrame);
                    if (spawnerRef.current) clearInterval(spawnerRef.current);
                };
            }, [isRunning]);

            const startDiagnostic = () => {
                setProgress(0);
                setIsRunning(true);
                
                // Sweep previous physics artifacts
                if (engineRef.current) {
                    const bodies = Composite.allBodies(engineRef.current.world);
                    const dynamicBodies = bodies.filter(b => !b.isStatic);
                    World.remove(engineRef.current.world, dynamicBodies);
                }
            };

            return (
                <div className="container">
                    <h1>SYSTEM DIAGNOSTIC TOOL</h1>
                    
                    <div className="panel">
                        <h2>[ CONTROL PANEL ]</h2>
                        <button onClick={startDiagnostic} disabled={isRunning}>
                            Run Full Diagnostic
                        </button>
                        
                        <div className="control-group">
                            <label>Gravity Override: <strong>{gravity.toFixed(1)}</strong></label>
                            <input 
                                type="range" 
                                min="0.1" 
                                max="10" 
                                step="0.1" 
                                value={gravity}
                                onChange={(e) => setGravity(parseFloat(e.target.value))}
                            />
                        </div>
                    </div>

                    <div className="panel">
                        <h2>[ READOUT PANEL ]</h2>
                        <div className="readout-status">&gt; STATUS: {status}</div>
                        <div className="progress-container">
                            <div className="progress-bar" style={{ width: `${progress}%` }}></div>
                        </div>
                        <div style={{ textAlign: "right", marginTop: "8px", fontWeight: "bold" }}>
                            {Math.floor(progress)}%
                        </div>
                    </div>

                    <div className="panel">
                        <h2>[ CANVAS PANEL : PHYSICS TEST TARGET ]</h2>
                        <div className="canvas-panel" ref={sceneRef}>
                        </div>
                    </div>
                </div>
            );
        }

        // Render React Component
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DiagnosticTool />);
    </script>
</body>
</html>
